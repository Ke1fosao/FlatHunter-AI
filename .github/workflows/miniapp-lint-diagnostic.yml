name: Apply Mini App navigation fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch-navigation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/miniapp-button-wiring
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - name: Route featured listing to the real feed
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("miniapp/src/components/app-shell.tsx")
          content = path.read_text()
          old = 'navigate("search");'
          new = 'navigate("feed");'
          count = content.count(old)
          if count != 1:
              raise SystemExit(f"expected exactly one featured listing marker, found {count}")
          path.write_text(content.replace(old, new, 1))
          PY
      - run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: miniapp
      - run: npm run lint
        working-directory: miniapp
      - run: npm test -- src/components/app-shell-navigation.test.tsx
        working-directory: miniapp
      - name: Commit verified navigation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp/src/components/app-shell.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: open featured apartment feed"
          git push
