name: Mini App lint diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-log:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture ESLint output
        id: lint
        continue-on-error: true
        run: npm run lint > ../miniapp-lint.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: miniapp-lint-diagnostic
          path: miniapp-lint.log
          if-no-files-found: error
      - if: steps.lint.outcome == 'failure'
        run: exit 1
