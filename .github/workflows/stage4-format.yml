name: Stage 4 Formatter

on:
  push:
    branches: [stage-4-deterministic-matching]

permissions:
  contents: write

concurrency:
  group: stage4-formatter
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-4-deterministic-matching
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv
      - run: uv pip install --python .venv/bin/python --requirement requirements-dev.lock
      - name: Format Stage 4 Python files
        run: uv run --no-sync ruff format apps/matching apps/searches/views.py apps/searches/serializers.py tests/test_matching.py
      - name: Commit formatter result
        working-directory: .
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/apps/matching backend/apps/searches/views.py backend/apps/searches/serializers.py backend/tests/test_matching.py
          git commit -m "style: apply Ruff formatting to Stage 4"
          git push origin HEAD:stage-4-deterministic-matching
