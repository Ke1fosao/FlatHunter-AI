name: Remove duplicate listing auth reload

on:
  pull_request:
    paths:
      - ".github/workflows/apply-listing-auth-cleanup.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/miniapp-full-functionality
      - name: Apply structural listener cleanup
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("miniapp/src/components/listing-details.tsx")
          content = path.read_text()
          content = content.replace("  TELEGRAM_AUTHENTICATED_EVENT,\n", "", 1)
          pattern = re.compile(
              r'''  useEffect\(\(\) => \{\n'''
              r'''    const controller = new AbortController\(\);\n'''
              r'''    void load\(controller\.signal\);\n'''
              r'''    const reload = \(\) => \{\n'''
              r'''      void load\(\);\n'''
              r'''    \};\n'''
              r'''    window\.addEventListener\(TELEGRAM_AUTHENTICATED_EVENT, reload\);\n'''
              r'''    return \(\) => \{\n'''
              r'''      controller\.abort\(\);\n'''
              r'''      window\.removeEventListener\(TELEGRAM_AUTHENTICATED_EVENT, reload\);\n'''
              r'''    \};\n'''
              r'''  \}, \[load\]\);'''
          )
          replacement = '''  useEffect(() => {
            const controller = new AbortController();
            void load(controller.signal);
            return () => {
              controller.abort();
            };
          }, [load]);'''
          content, count = pattern.subn(replacement, content, count=1)
          if count != 1:
              raise SystemExit(f"listener block replacements: {count}")
          path.write_text(content)
          PY
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp/src/components/listing-details.tsx
          git commit -m "fix: avoid duplicate listing loads after auth gate"
          git push
