name: Apply Mini App ESLint fixes

on:
  pull_request:
    paths:
      - "miniapp/**"
      - ".github/workflows/apply-miniapp-eslint-fixes.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/miniapp-full-functionality
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: miniapp
      - name: Apply safe ESLint fixes
        working-directory: miniapp
        run: npx eslint . --fix
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            exit 0
          fi
          git add miniapp
          git commit -m "fix: apply strict Mini App lint corrections"
          git push
