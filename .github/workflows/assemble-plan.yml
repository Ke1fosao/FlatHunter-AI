name: Assemble full project plan

on:
  push:
    branches: [fix/backend-ci-and-full-plan]
    paths:
      - ".plan_chunks/**"

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/backend-ci-and-full-plan
      - name: Assemble canonical Markdown plan
        run: |
          cat .plan_chunks/[0-9][0-9].part > docs/flathunter-ai-master-plan.md
          rm -rf .plan_chunks
      - name: Commit assembled plan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add full FlatHunter AI project plan"
          git push
