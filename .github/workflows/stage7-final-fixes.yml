name: Stage 7 Final Fixes

on:
  push:
    branches: [stage-7-duplicate-clustering]

permissions:
  contents: write

concurrency:
  group: stage7-final-fixes
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-7-duplicate-clustering
      - name: Apply verified fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              content = file.read_text()
              if old not in content:
                  raise SystemExit(f"Expected block not found in {path}")
              file.write_text(content.replace(old, new, 1))

          replace(
              "backend/apps/searches/views.py",
              '''                "meta": {
                    "algorithm": "deterministic-v1-cluster-aware",
                    "min_score": params["min_score"],
                    "eligible_only": params["eligible_only"],
                    "ordering": ordering,
                },
''',
              '''                "meta": {
                    "algorithm": "deterministic-v1",
                    "presentation": "cluster-aware",
                    "min_score": params["min_score"],
                    "eligible_only": params["eligible_only"],
                    "ordering": ordering,
                },
''',
          )
          replace(
              "backend/apps/duplicates/presentation.py",
              '''from django.db.models import Prefetch, QuerySet
''',
              '''from django.db.models import Case, IntegerField, Prefetch, QuerySet, When
''',
          )
          replace(
              "backend/apps/duplicates/presentation.py",
              '''from apps.listings.models import Listing, UserListingState


def presentation_queryset''',
              '''from apps.listings.models import Listing, UserListingState

_PRIMARY_FIRST = Case(
    When(role=ClusterMemberRole.PRIMARY, then=0),
    default=1,
    output_field=IntegerField(),
)


def presentation_queryset''',
          )
          replace(
              "backend/apps/duplicates/presentation.py",
              '''    ).order_by("role", "-confidence", "listing__published_at")
''',
              '''    ).order_by(_PRIMARY_FIRST, "-confidence", "-listing__published_at")
''',
          )
          replace(
              "backend/apps/duplicates/presentation.py",
              '''        cluster.members.select_related("listing", "listing__source").order_by(
            "role",
            "-confidence",
            "-listing__published_at",
        )
''',
              '''        cluster.members.select_related("listing", "listing__source").order_by(
            _PRIMARY_FIRST,
            "-confidence",
            "-listing__published_at",
        )
''',
          )
          replace(
              "backend/apps/duplicates/services.py",
              '''    cluster = (
        ListingCluster.objects.select_for_update()
        .select_related("primary_listing")
        .get(pk=cluster.pk, status="active")
    )
''',
              '''    cluster = ListingCluster.objects.select_for_update().get(
        pk=cluster.pk,
        status="active",
    )
''',
          )
          replace(
              "backend/apps/duplicates/clustering.py",
              '''    for cluster in affected_clusters:
        cluster.status = ClusterStatus.ARCHIVED
        cluster.member_count = 0
        cluster.source_count = 0
        cluster.primary_listing = None
        cluster.confidence_min = None
        cluster.confidence_max = None
        cluster.save(
''',
              '''    for archived_cluster in affected_clusters:
        archived_cluster.status = ClusterStatus.ARCHIVED
        archived_cluster.member_count = 0
        archived_cluster.source_count = 0
        archived_cluster.primary_listing = None
        archived_cluster.confidence_min = None
        archived_cluster.confidence_max = None
        archived_cluster.save(
''',
          )
          replace(
              "backend/apps/listings/views.py",
              '''            cast(Any, cluster).current_user_cluster_states = [state]
''',
              '''            setattr(cluster, "current_user_cluster_states", [state])
''',
          )
          replace(
              "miniapp/src/lib/cluster-api.ts",
              '''export function formatClusterPriceRange(minimum: number, maximum: number): string {
  const format = new Intl.NumberFormat("uk-UA");
  if (minimum === maximum) return `${format.format(minimum)} грн`;
  return `${format.format(minimum)}–${format.format(maximum)} грн`;
}
''',
              '''export function formatClusterPriceRange(minimum: number, maximum: number): string {
  const numberFormat = new Intl.NumberFormat("uk-UA");
  const format = (value: number) =>
    numberFormat.format(value).replaceAll("\\u00A0", " ").replaceAll("\\u202F", " ");
  if (minimum === maximum) return `${format(minimum)} грн`;
  return `${format(minimum)}–${format(maximum)} грн`;
}
''',
          )
          replace(
              "miniapp/src/components/stage-six-shell.test.tsx",
              '''vi.mock("@/components/listing-feed", () => ({
  ListingFeed: () => <div>Listing workspace</div>
}));
''',
              '''vi.mock("@/components/cluster-browser", () => ({
  ClusterBrowser: () => <div>Cluster browser</div>
}));
vi.mock("@/components/listing-feed", () => ({
  ListingFeed: () => <div>Listing workspace</div>
}));
''',
          )
          replace(
              "miniapp/src/components/stage-six-shell.test.tsx",
              '''    expect(screen.getByText("Listing workspace")).toBeInTheDocument();
    fireEvent.click(screen.getByRole("button", { name: "◉ Карта" }));

    expect(screen.getByText("PostGIS map workspace")).toBeInTheDocument();
    expect(screen.queryByText("Listing workspace")).not.toBeInTheDocument();
''',
              '''    expect(screen.getByText("Cluster browser")).toBeInTheDocument();
    fireEvent.click(screen.getByRole("button", { name: "◉ Карта" }));

    expect(screen.getByText("PostGIS map workspace")).toBeInTheDocument();
    expect(screen.queryByText("Cluster browser")).not.toBeInTheDocument();
''',
          )
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - name: Format changed Python files
        run: |
          cd backend
          uv venv
          uv pip install --python .venv/bin/python --requirement requirements-dev.lock
          uv run --no-sync ruff format apps/searches/views.py apps/duplicates/presentation.py apps/duplicates/services.py apps/duplicates/clustering.py apps/listings/views.py
      - name: Commit final fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend miniapp
          git commit -m "fix: complete Stage 7 verification fixes"
          git push origin HEAD:stage-7-duplicate-clustering
