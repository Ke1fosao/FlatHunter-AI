name: Backend CI diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-diagnostic:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgresql://flathunter:flathunter@flathunter-postgres:5432/flathunter_test
      REDIS_URL: redis://flathunter-redis:6379/0
      TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
      GEOCODING_PROVIDER: demo
      GEOCODING_EXTERNAL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag flathunter-backend:diagnostic ./backend
      - name: Start backend services
        run: |
          docker network create flathunter-diagnostic
          docker run -d --network flathunter-diagnostic --name flathunter-postgres -e POSTGRES_DB=flathunter_test -e POSTGRES_USER=flathunter -e POSTGRES_PASSWORD=flathunter postgis/postgis:17-3.5
          docker run -d --network flathunter-diagnostic --name flathunter-redis redis:8-alpine
          for attempt in $(seq 1 30); do
            docker exec flathunter-postgres pg_isready -U flathunter -d flathunter_test && exit 0
            sleep 2
          done
          exit 1
      - name: Capture backend quality gates
        id: quality
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm --network flathunter-diagnostic \
            --env DJANGO_SECRET_KEY --env DJANGO_DEBUG --env DATABASE_URL --env REDIS_URL \
            --env TELEGRAM_WEBHOOK_SECRET --env GEOCODING_PROVIDER --env GEOCODING_EXTERNAL_ENABLED \
            --entrypoint sh flathunter-backend:diagnostic -ec '
              uv pip install --system --requirement requirements-dev.lock
              ruff format --check apps config tests manage.py
              ruff check apps config tests manage.py
              mypy apps config
              python manage.py migrate --noinput
              python manage.py makemigrations --check --dry-run
              pytest --cov=apps --cov-report=term-missing
              uvx pip-audit --strict -r requirements.lock
            ' 2>&1 | tee backend-quality.log
      - name: Upload backend diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-log
          path: backend-quality.log
          if-no-files-found: error
      - name: Preserve quality gate result
        if: steps.quality.outcome == 'failure'
        run: exit 1
