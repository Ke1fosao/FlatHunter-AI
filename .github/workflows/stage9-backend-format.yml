name: Stage 9 backend format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-stage9-backend:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/stage-9-risk-market-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Clean migration and format Python
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/apps/analysis/migrations/0001_initial.py")
          content = path.read_text()
          content = content.replace(
              'model_name="listingmarketaassessment" if False else "listingmarketassessment",',
              'model_name="listingmarketassessment",',
          )
          path.write_text(content)
          PY
          python -m pip install --disable-pip-version-check ruff==0.15.21
          cd backend
          ruff format apps config tests manage.py
          ruff check apps config tests manage.py --fix
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format Stage 9 backend"
          git push
