name: Mini App typecheck diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck-log:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture TypeScript output
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > ../miniapp-typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: miniapp-typecheck-diagnostic
          path: miniapp-typecheck.log
          if-no-files-found: error
      - if: steps.typecheck.outcome == 'failure'
        run: exit 1
