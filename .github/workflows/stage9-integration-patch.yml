name: Stage 9 integration patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch-stage9-integration:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/stage-9-risk-market-analysis
      - name: Patch Stage 8 context, Mini App, and trusted risk metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          services = Path("backend/apps/ai_analysis/services.py")
          content = services.read_text()
          import_marker = "from apps.accounts.models import User\n"
          import_line = "from apps.analysis.context import validated_analysis_context\n"
          if import_line not in content:
              content = content.replace(import_marker, import_marker + import_line, 1)
          context_marker = "    if profile is not None:\n        match = evaluate_match(profile, listing).to_dict()\n"
          context_replacement = (
              "    context.update(validated_analysis_context(listing))\n"
              "    if profile is not None:\n"
              "        match = evaluate_match(profile, listing).to_dict()\n"
          )
          if "context.update(validated_analysis_context(listing))" not in content:
              if context_marker not in content:
                  raise SystemExit("listing_context marker not found")
              content = content.replace(context_marker, context_replacement, 1)
          services.write_text(content)

          rules = Path("backend/apps/ai_analysis/rules.py")
          content = rules.read_text()
          old = (
              "        (\n"
              "            \"Risk Score буде доданий окремим ринковим і ризиковим етапом; \"\n"
              "            \"зараз він позначається як невідомий.\"\n"
              "        ),\n"
          )
          new = (
              "        (\n"
              "            \"Risk Score використовується лише з валідованого Stage 9 assessment; \"\n"
              "            \"коли даних недостатньо або результат застарів, він залишається невідомим.\"\n"
              "        ),\n"
          )
          if old in content:
              content = content.replace(old, new, 1)
          rules.write_text(content)

          feed = Path("miniapp/src/components/listing-feed.tsx")
          content = feed.read_text()
          component_import = 'import { AnalysisChips, ListingAnalysisPanel } from "@/components/listing-analysis-panel";\n'
          if component_import not in content:
              content = content.replace(
                  'import { useCallback, useEffect, useMemo, useState } from "react";\n\n',
                  'import { useCallback, useEffect, useMemo, useState } from "react";\n\n' + component_import,
                  1,
              )
          type_import = 'import type { AnalysisSummary } from "@/lib/analysis-api";\n'
          if type_import not in content:
              content = content.replace(component_import, component_import + type_import, 1)
          type_marker = 'type WorkspaceTab = "dashboard" | "feed" | "favorites" | "comparison";\n'
          helper = (
              'type AnalyzedListing = ListingFeedItem & { analysis_summary?: AnalysisSummary };\n\n'
              'function listingAnalysis(listing: ListingFeedItem): AnalysisSummary | undefined {\n'
              '  return (listing as AnalyzedListing).analysis_summary;\n'
              '}\n\n'
          )
          if "function listingAnalysis" not in content:
              content = content.replace(type_marker, helper + type_marker, 1)
          card_marker = '          {match && <p className="workspace-card__summary">{match.summary}</p>}\n'
          card_replacement = (
              '          <AnalysisChips summary={listingAnalysis(listing)} />\n'
              '          {match && <p className="workspace-card__summary">{match.summary}</p>}\n'
          )
          if '<AnalysisChips summary={listingAnalysis(listing)} />' not in content:
              if card_marker not in content:
                  raise SystemExit("listing card marker not found")
              content = content.replace(card_marker, card_replacement, 1)
          detail_marker = '        <a className="detail-panel__source" href={listing.source_url} target="_blank" rel="noreferrer">Відкрити першоджерело ↗</a>\n'
          detail_replacement = (
              '        <ListingAnalysisPanel listingId={listing.id} summary={listingAnalysis(listing)} />\n'
              + detail_marker
          )
          if '<ListingAnalysisPanel listingId={listing.id}' not in content:
              if detail_marker not in content:
                  raise SystemExit("listing detail marker not found")
              content = content.replace(detail_marker, detail_replacement, 1)
          feed.write_text(content)

          snapshots = Path("backend/apps/analysis/snapshots.py")
          content = snapshots.read_text()
          marker = '    "furniture",\n'
          addition = '    "hidden_commission",\n    "address_coordinate_mismatch",\n'
          if '    "hidden_commission",\n' not in content:
              content = content.replace(marker, marker + addition, 1)
          snapshots.write_text(content)

          risk = Path("backend/apps/analysis/risk.py")
          content = risk.read_text()
          function_marker = "\ndef _commission_signal(listing: Listing) -> RiskSignal | None:\n"
          metadata_function = '''\ndef _metadata_signals(listing: Listing) -> list[RiskSignal]:
    attributes = listing.attributes if isinstance(listing.attributes, dict) else {}
    signals: list[RiskSignal] = []
    relisted_count = attributes.get("relisted_count")
    if isinstance(relisted_count, int) and relisted_count >= 3:
        signals.append(
            _signal(
                "frequent_relisting",
                min(6 + relisted_count, 14),
                "medium" if relisted_count >= 5 else "low",
                "Оголошення неодноразово перевиставлялося",
                "Уточніть причину повторних публікацій і поточну актуальність квартири.",
                relisted_count=relisted_count,
            )
        )
    if attributes.get("address_coordinate_mismatch") is True:
        signals.append(
            _signal(
                "address_coordinate_mismatch",
                16,
                "medium",
                "Перевірена адресна ознака не узгоджується з координатами",
                "Звірте адресу на перегляді та не покладайтеся лише на точку на карті.",
                location_accuracy=listing.location_accuracy,
                trusted_mismatch=True,
            )
        )
    return signals
'''
          if "def _metadata_signals" not in content:
              if function_marker not in content:
                  raise SystemExit("commission marker not found")
              content = content.replace(function_marker, metadata_function + function_marker, 1)
          extend_marker = "    signals.extend(_price_history_signals(listing))\n    signals.extend(_content_signals(listing))\n"
          extend_replacement = (
              "    signals.extend(_price_history_signals(listing))\n"
              "    signals.extend(_content_signals(listing))\n"
              "    signals.extend(_metadata_signals(listing))\n"
          )
          if "signals.extend(_metadata_signals(listing))" not in content:
              if extend_marker not in content:
                  raise SystemExit("risk aggregation marker not found")
              content = content.replace(extend_marker, extend_replacement, 1)
          risk.write_text(content)

          tests = Path("backend/tests/test_stage9_risk.py")
          content = tests.read_text()
          test_block = '''\n\ndef test_trusted_metadata_signals_are_scored_and_explained(risk_source):
    listing = make_risk_listing(
        risk_source,
        "risk-metadata",
        description=(
            "Синтетичне оголошення з достатнім описом умов, площі, поверху, договору "
            "та порядку перевірки документів під час особистого перегляду квартири."
        ),
    )
    listing.attributes = {
        "demo": True,
        "relisted_count": 5,
        "address_coordinate_mismatch": True,
    }
    listing.save(update_fields=("attributes",))

    result = calculate_risk_assessment(listing, make_market(listing, "-4.00"))
    signals = {signal.code: signal for signal in result.signals}

    assert "frequent_relisting" in signals
    assert signals["frequent_relisting"].evidence["relisted_count"] == 5
    assert "address_coordinate_mismatch" in signals
    assert signals["address_coordinate_mismatch"].evidence["trusted_mismatch"] is True
'''
          if "test_trusted_metadata_signals_are_scored_and_explained" not in content:
              content += test_block
          tests.write_text(content)
          PY
          python -m pip install --disable-pip-version-check ruff==0.15.21
          cd backend
          ruff format apps/analysis/snapshots.py apps/analysis/risk.py tests/test_stage9_risk.py
          ruff check apps/analysis/snapshots.py apps/analysis/risk.py tests/test_stage9_risk.py --fix
      - name: Commit Stage 9 integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/apps/ai_analysis/services.py backend/apps/ai_analysis/rules.py miniapp/src/components/listing-feed.tsx backend/apps/analysis/snapshots.py backend/apps/analysis/risk.py backend/tests/test_stage9_risk.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat: complete Stage 9 analytics integration"
          git push
