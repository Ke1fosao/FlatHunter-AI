name: Stage 7 Backend Patch

on:
  push:
    branches: [stage-7-duplicate-clustering]

permissions:
  contents: write

concurrency:
  group: stage7-backend-patch
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-7-duplicate-clustering
      - name: Apply verified backend fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              content = file.read_text()
              if old not in content:
                  raise SystemExit(f'Expected block not found in {path}')
              file.write_text(content.replace(old, new, 1))

          replace(
              'backend/apps/duplicates/models.py',
              '''    def clean(self) -> None:\n        super().clean()\n        if self.left_listing_id and self.right_listing_id:\n            if str(self.left_listing_id) >= str(self.right_listing_id):\n                raise ValidationError("Duplicate candidate listing IDs must use canonical order.")\n\n    def __str__(self) -> str:\n        return f"{self.left_listing_id} ↔ {self.right_listing_id}: {self.final_score}"\n''',
              '''    def __str__(self) -> str:\n        return f"{self.left_listing_id} ↔ {self.right_listing_id}: {self.final_score}"\n\n    def clean(self) -> None:\n        super().clean()\n        if (\n            self.left_listing_id\n            and self.right_listing_id\n            and str(self.left_listing_id) >= str(self.right_listing_id)\n        ):\n            raise ValidationError("Duplicate candidate listing IDs must use canonical order.")\n''',
          )
          replace(
              'backend/apps/duplicates/models.py',
              '''    def save(self, *args: Any, **kwargs: Any) -> None:\n        if self.pk and type(self).objects.filter(pk=self.pk).exists():\n            raise ValidationError("DuplicateDecision records are immutable.")\n        super().save(*args, **kwargs)\n\n    def __str__(self) -> str:\n        return f"{self.action}: {self.left_listing_id} ↔ {self.right_listing_id}"\n''',
              '''    def __str__(self) -> str:\n        return f"{self.action}: {self.left_listing_id} ↔ {self.right_listing_id}"\n\n    def save(self, *args: Any, **kwargs: Any) -> None:\n        if self.pk and type(self).objects.filter(pk=self.pk).exists():\n            raise ValidationError("DuplicateDecision records are immutable.")\n        super().save(*args, **kwargs)\n''',
          )
          replace(
              'backend/apps/duplicates/normalization.py',
              '''def haversine_metres(left: Listing, right: Listing) -> float | None:\n    if None in (left.latitude, left.longitude, right.latitude, right.longitude):\n        return None\n    left_lat = math.radians(float(left.latitude))\n    right_lat = math.radians(float(right.latitude))\n    delta_lat = right_lat - left_lat\n    delta_lon = math.radians(float(right.longitude) - float(left.longitude))\n''',
              '''def haversine_metres(left: Listing, right: Listing) -> float | None:\n    left_latitude = left.latitude\n    left_longitude = left.longitude\n    right_latitude = right.latitude\n    right_longitude = right.longitude\n    if None in (left_latitude, left_longitude, right_latitude, right_longitude):\n        return None\n    assert left_latitude is not None\n    assert left_longitude is not None\n    assert right_latitude is not None\n    assert right_longitude is not None\n    left_lat = math.radians(float(left_latitude))\n    right_lat = math.radians(float(right_latitude))\n    delta_lat = right_lat - left_lat\n    delta_lon = math.radians(float(right_longitude) - float(left_longitude))\n''',
          )
          replace(
              'backend/apps/duplicates/scoring.py',
              '''    weighted = sum(\n        Decimal(str(value)) * _COMPONENT_WEIGHTS[key] for key, value in available.items()\n    )\n    total_weight = sum(_COMPONENT_WEIGHTS[key] for key in available)\n''',
              '''    weighted = sum(\n        (Decimal(str(value)) * _COMPONENT_WEIGHTS[key] for key, value in available.items()),\n        start=Decimal("0"),\n    )\n    total_weight = sum(\n        (_COMPONENT_WEIGHTS[key] for key in available),\n        start=Decimal("0"),\n    )\n''',
          )
          replace(
              'backend/apps/duplicates/scoring.py',
              '''    elif compatible_exact_rule:\n        decision = CandidateDecision.AUTO_MERGE\n    elif final >= auto_threshold:\n        decision = CandidateDecision.AUTO_MERGE\n''',
              '''    elif compatible_exact_rule or final >= auto_threshold:\n        decision = CandidateDecision.AUTO_MERGE\n''',
          )
          replace(
              'backend/apps/duplicates/clustering.py',
              '''        cluster = _cluster_for_component(component, existing_memberships, used_clusters)\n        old_cluster_id: str | None = None\n        if cluster is None:\n            cluster = ListingCluster.objects.create(algorithm_version=1)\n            created += 1\n        else:\n            old_cluster_id = str(cluster.id)\n            used_clusters.add(old_cluster_id)\n            reused += 1\n        confidences: list[Decimal] = []\n''',
              '''        cluster: ListingCluster | None = _cluster_for_component(\n            component, existing_memberships, used_clusters\n        )\n        old_cluster_id: str | None = None\n        if cluster is None:\n            cluster = ListingCluster.objects.create(algorithm_version=1)\n            created += 1\n        else:\n            old_cluster_id = str(cluster.id)\n            used_clusters.add(old_cluster_id)\n            reused += 1\n        assert cluster is not None\n        confidences: list[Decimal] = []\n''',
          )
          replace(
              'backend/apps/listings/views.py',
              '''            cluster.current_user_cluster_states = [state]\n''',
              '''            cast(Any, cluster).current_user_cluster_states = [state]\n''',
          )
          replace(
              'backend/apps/listings/views.py',
              '''            state, _ = UserListingState.objects.get_or_create(user=user, listing=listing)\n            setattr(state, field, value)\n            state.save(update_fields=(field, "updated_at"))\n        listing.current_user_states = [state]\n''',
              '''            listing_state, _ = UserListingState.objects.get_or_create(\n                user=user, listing=listing\n            )\n            setattr(listing_state, field, value)\n            listing_state.save(update_fields=(field, "updated_at"))\n        listing.current_user_states = [listing_state]\n''',
          )
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - name: Format changed Python files
        run: |
          cd backend
          uv venv
          uv pip install --python .venv/bin/python --requirement requirements-dev.lock
          uv run --no-sync ruff format apps/duplicates/models.py apps/duplicates/normalization.py apps/duplicates/scoring.py apps/duplicates/clustering.py apps/listings/views.py
      - name: Commit backend fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "fix: resolve Stage 7 backend quality gates"
          git push origin HEAD:stage-7-duplicate-clustering
