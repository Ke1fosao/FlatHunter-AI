name: Assemble Stage 1 pull request

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - stage1-source.ready
      - stage1-source.part-*

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'stage-1-foundation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-1-foundation
          fetch-depth: 0
      - name: Check whether assembly is needed
        id: source
        run: |
          if [ -f stage1-source.ready ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@v6
        if: steps.source.outputs.ready == 'true'
        with:
          version: "0.9.26"
      - uses: actions/setup-node@v4
        if: steps.source.outputs.ready == 'true'
        with:
          node-version: "24"
      - name: Extract verified source tree
        if: steps.source.outputs.ready == 'true'
        run: |
          cat stage1-source.part-* | base64 --decode > /tmp/stage1-source.tar.gz
          tar --extract --gzip --file /tmp/stage1-source.tar.gz
          rm stage1-source.part-* stage1-source.ready
          rm -f .github/workflows/bootstrap-stage1.yml
      - name: Generate deterministic lock files
        if: steps.source.outputs.ready == 'true'
        run: |
          cd backend
          uv lock
          cd ../miniapp
          npm install --package-lock-only --ignore-scripts
      - name: Commit extracted source
        if: steps.source.outputs.ready == 'true'
        run: |
          git config user.name "FlatHunter CI"
          git config user.email "actions@users.noreply.github.com"
          git add --all
          git commit -m "feat: implement stage 1 foundation"
          git push origin HEAD:stage-1-foundation
