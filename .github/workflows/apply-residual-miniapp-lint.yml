name: Apply residual Mini App lint fixes

on:
  pull_request:
    paths:
      - ".github/workflows/apply-residual-miniapp-lint.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/miniapp-full-functionality
      - name: Apply exact lint corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text()
              if old not in content:
                  raise SystemExit(f"marker missing: {path}: {old!r}")
              target.write_text(content.replace(old, new, 1))

          replace(
              "miniapp/src/components/comparison-workspace.tsx",
              'setProfileId((current) => current || activeProfiles.at(0)?.id || "");',
              'setProfileId((current) =>\n        current.length > 0 ? current : (activeProfiles.at(0)?.id ?? ""),\n      );',
          )
          replace(
              "miniapp/src/components/search-results-workspace.tsx",
              'user_state: response.user_state ?? primary.user_state ?? current.user_state,',
              'user_state: response.user_state ?? primary.user_state,',
          )
          replace(
              "miniapp/src/components/search-results-workspace.tsx",
              'setProfileId((current) => current || active.at(0)?.id || "");',
              'setProfileId((current) =>\n      current.length > 0 ? current : (active.at(0)?.id ?? ""),\n    );',
          )
          PY
      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp/src/components/comparison-workspace.tsx miniapp/src/components/search-results-workspace.tsx
          git commit -m "fix: resolve residual Mini App lint rules"
          git push
