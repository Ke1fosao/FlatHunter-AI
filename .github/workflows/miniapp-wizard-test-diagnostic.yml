name: Mini App wizard test diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-log:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture Vitest output
        id: tests
        continue-on-error: true
        run: npm test > ../miniapp-wizard-test.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: miniapp-wizard-test-diagnostic
          path: miniapp-wizard-test.log
          if-no-files-found: error
      - if: steps.tests.outcome == 'failure'
        run: exit 1
