name: Stage 7 Patch

on:
  push:
    branches: [stage-7-duplicate-clustering]

permissions:
  contents: write

concurrency:
  group: stage7-patch
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-7-duplicate-clustering
      - name: Apply exact TypeScript patch
        run: |
          python - <<'PY'
          from pathlib import Path

          api = Path('miniapp/src/lib/cluster-api.ts')
          content = api.read_text()
          content = content.replace(
              'export type ClusterListing = Omit<ListingFeedItem, "floors_total"> & {\n  floors_total: string | null;\n',
              'export type ClusterListing = ListingFeedItem & {\n',
          )
          api.write_text(content)

          browser = Path('miniapp/src/components/cluster-browser.tsx')
          content = browser.read_text()
          old = '${String(listing.floor)}/${listing.floors_total ?? "?"}'
          new = '${String(listing.floor)}/${String(listing.floors_total ?? "?")}'
          if old not in content:
              raise SystemExit('Expected floor expression was not found')
          browser.write_text(content.replace(old, new, 1))
          PY
      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp/src/lib/cluster-api.ts miniapp/src/components/cluster-browser.tsx
          git commit -m "fix: preserve numeric cluster floor types"
          git push origin HEAD:stage-7-duplicate-clustering
