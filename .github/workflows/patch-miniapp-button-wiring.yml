name: Patch Mini App button wiring

on:
  push:
    branches: [fix/miniapp-button-wiring]

permissions:
  contents: write

jobs:
  patch-listing-feed:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/miniapp-button-wiring
          fetch-depth: 0
      - name: Restore ListingFeed formatting and apply focused change
        run: |
          git show origin/main:miniapp/src/components/listing-feed.tsx > miniapp/src/components/listing-feed.tsx
          python - <<'PY'
          from pathlib import Path

          path = Path("miniapp/src/components/listing-feed.tsx")
          content = path.read_text()
          content = content.replace(
              'type WorkspaceTab = "dashboard" | "feed" | "favorites" | "comparison";',
              'export type WorkspaceTab = "dashboard" | "feed" | "favorites" | "comparison";',
              1,
          )
          content = content.replace(
              'export function ListingFeed() {\n  const [tab, setTab] = useState<WorkspaceTab>("dashboard");',
              'export function ListingFeed({ initialTab = "dashboard" }: { initialTab?: WorkspaceTab }) {\n  const [tab, setTab] = useState<WorkspaceTab>(initialTab);',
              1,
          )
          marker = '  const [message, setMessage] = useState("");\n\n'
          replacement = (
              '  const [message, setMessage] = useState("");\n\n'
              '  useEffect(() => {\n'
              '    setTab(initialTab);\n'
              '  }, [initialTab]);\n\n'
          )
          if marker not in content:
              raise SystemExit("ListingFeed state marker not found")
          content = content.replace(marker, replacement, 1)
          path.write_text(content)
          PY
      - name: Verify focused frontend tests
        working-directory: miniapp
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm test -- src/components/stage-six-shell.test.tsx
      - name: Commit focused patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp/src/components/listing-feed.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "refactor: keep ListingFeed tab patch focused"
          git push
