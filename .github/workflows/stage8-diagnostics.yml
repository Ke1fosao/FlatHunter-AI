name: Stage 8 diagnostics

on:
  push:
    branches: [fix/stage-8-ai-hardening]

permissions:
  contents: write

jobs:
  frontend-diagnostics:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/stage-8-ai-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture checks
        run: |
          set +e
          npm run lint > ../stage8-frontend.log 2>&1
          echo "lint_exit=$?" >> ../stage8-frontend.log
          npm run typecheck >> ../stage8-frontend.log 2>&1
          echo "typecheck_exit=$?" >> ../stage8-frontend.log
          npm test >> ../stage8-frontend.log 2>&1
          echo "test_exit=$?" >> ../stage8-frontend.log
          npm run build >> ../stage8-frontend.log 2>&1
          echo "build_exit=$?" >> ../stage8-frontend.log
          exit 0
      - name: Commit diagnostic log
        working-directory: .
        run: |
          mkdir -p .stage8-diagnostics
          mv stage8-frontend.log .stage8-diagnostics/frontend.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .stage8-diagnostics/frontend.log
          git commit -m "chore: capture Stage 8 frontend diagnostics"
          git push
