name: Format Stage 2

on:
  push:
    branches: [stage-2-search-profiles]
    paths-ignore:
      - '.github/workflows/format-stage2.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-2-search-profiles
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.9.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Format backend
        working-directory: backend
        run: |
          uv venv
          uv pip install --python .venv/bin/python --requirement requirements-dev.lock
          uv run --no-sync ruff format apps config tests manage.py
          uv run --no-sync ruff check --fix apps config tests manage.py
      - name: Format frontend
        working-directory: miniapp
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm run lint -- --fix
      - name: Commit formatter output
        run: |
          git config user.name 'FlatHunter CI'
          git config user.email 'actions@users.noreply.github.com'
          git add backend miniapp
          git diff --cached --quiet || git commit -m 'style: format Stage 2 implementation'
          git push origin HEAD:stage-2-search-profiles
