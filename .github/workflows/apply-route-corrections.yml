name: Apply routed Mini App corrections

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/miniapp-routed-navigation
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - name: Apply focused corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text()
              if old not in content:
                  raise SystemExit(f"marker not found in {path}: {old!r}")
              target.write_text(content.replace(old, new, 1))

          replace(
              "miniapp/src/components/search-home.tsx",
              "const primaryProfile = activeProfiles[0];",
              "const primaryProfile = activeProfiles.at(0);",
          )
          replace(
              "miniapp/src/components/favorites-workspace.tsx",
              'import { useCallback, useEffect, useMemo, useState } from "react";',
              'import Link from "next/link";\nimport { useCallback, useEffect, useMemo, useState } from "react";',
          )
          replace(
              "miniapp/src/components/favorites-workspace.tsx",
              'action={<a href="/search">Перейти до пошуку</a>}',
              'action={<Link href="/search">Перейти до пошуку</Link>}',
          )
          replace(
              "miniapp/src/components/listing-details.tsx",
              'import { useCallback, useEffect, useMemo, useState } from "react";',
              'import Link from "next/link";\nimport { useCallback, useEffect, useMemo, useState } from "react";',
          )
          replace(
              "miniapp/src/components/listing-details.tsx",
              'action={<a href="/search">Повернутися до пошуку</a>}',
              'action={<Link href="/search">Повернутися до пошуку</Link>}',
          )
          replace(
              "miniapp/src/components/comparison-workspace.tsx",
              'import { useCallback, useEffect, useMemo, useState } from "react";',
              'import { useCallback, useEffect, useMemo, useState } from "react";\nimport type { CSSProperties } from "react";',
          )
          replace(
              "miniapp/src/components/comparison-workspace.tsx",
              '<div className="comparison-cards" role="region" aria-label="Порівняння квартир">',
              '<div\n          className="comparison-cards"\n          role="region"\n          aria-label="Порівняння квартир"\n          style={{ "--comparison-count": String(items.length) } as CSSProperties}\n        >',
          )
          PY
      - run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: miniapp
      - run: npm run lint
        working-directory: miniapp
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miniapp/src/components
          git commit -m "fix: correct routed Mini App strict checks"
          git push
