name: Mini App production diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/miniapp-production-diagnostic.yml"
      - "miniapp/**"
      - "render.yaml"
      - "docs/cloud-hosting.md"

permissions:
  contents: read

jobs:
  backend-reachability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe Render backend
        shell: bash
        run: |
          set +e
          mkdir -p diagnostic
          base="https://flathunter-ai-backend.onrender.com"
          for path in "/health/live/" "/health/ready/" "/api/v1/health/"; do
            name="$(echo "$path" | tr '/' '_' | sed 's/^_//;s/_$//')"
            echo "=== $base$path ===" | tee -a diagnostic/summary.txt
            curl --location --silent --show-error --max-time 90 \
              --dump-header "diagnostic/${name}.headers" \
              --output "diagnostic/${name}.body" \
              --write-out "http_code=%{http_code}\ntime_total=%{time_total}\nremote_ip=%{remote_ip}\n" \
              "$base$path" | tee -a diagnostic/summary.txt
            status=${PIPESTATUS[0]}
            echo "curl_exit=$status" | tee -a diagnostic/summary.txt
            cat "diagnostic/${name}.body" | tee -a diagnostic/summary.txt
            echo | tee -a diagnostic/summary.txt
          done
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: miniapp-production-diagnostic
          path: diagnostic
          if-no-files-found: error

  frontend-red-diagnostic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture lint and targeted test output
        shell: bash
        run: |
          set +e
          npm run lint > ../frontend-red-lint.log 2>&1
          echo "$?" > ../frontend-red-lint.exit
          npm test -- \
            src/lib/api-client.test.ts \
            src/lib/server-api-proxy.test.ts \
            src/components/auth-gate.test.tsx \
            src/components/miniapp-context.test.tsx \
            src/components/search-profile-manager.test.tsx \
            src/components/search-wizard-edit.test.tsx \
            > ../frontend-red-tests.log 2>&1
          echo "$?" > ../frontend-red-tests.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: miniapp-frontend-red-diagnostic
          path: |
            frontend-red-lint.log
            frontend-red-lint.exit
            frontend-red-tests.log
            frontend-red-tests.exit
          if-no-files-found: error
