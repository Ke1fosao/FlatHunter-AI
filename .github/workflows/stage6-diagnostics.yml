name: Stage 6 Diagnostics

on:
  push:
    branches: [stage-6-map-geodata]

permissions:
  contents: read

concurrency:
  group: stage6-diagnostics
  cancel-in-progress: true

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - name: Capture Ruff diagnostics
        run: |
          cd backend
          uv venv
          uv pip install --python .venv/bin/python --requirement requirements-dev.lock
          uv run --no-sync ruff check apps config tests manage.py > ../stage6-ruff.txt 2>&1 || true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - name: Capture ESLint diagnostics
        run: |
          cd miniapp
          npm ci --ignore-scripts --no-audit --no-fund
          npm run lint > ../stage6-eslint.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: stage6-lint-diagnostics
          path: |
            stage6-ruff.txt
            stage6-eslint.txt
          retention-days: 1
