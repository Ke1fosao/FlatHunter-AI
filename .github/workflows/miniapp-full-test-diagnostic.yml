name: Mini App full test diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/miniapp-full-test-diagnostic.yml"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: miniapp
      - name: Capture full test output
        shell: bash
        run: |
          set +e
          cd miniapp
          npm test > ../miniapp-full-test.log 2>&1
          echo "$?" > ../miniapp-full-test.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: miniapp-full-test-diagnostic
          path: |
            miniapp-full-test.log
            miniapp-full-test.exit
          if-no-files-found: error
