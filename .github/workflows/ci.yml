name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Capture Ruff diagnostics
        run: |
          cd backend
          uvx ruff==0.15.21 format --check apps config tests manage.py > ../stage7-ruff-format.txt 2>&1 || true
          uvx ruff==0.15.21 check apps config tests manage.py > ../stage7-ruff-check.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: stage7-ruff-diagnostics
          path: |
            stage7-ruff-format.txt
            stage7-ruff-check.txt
          retention-days: 1
      - run: cd backend && uvx ruff==0.15.21 format --check apps config tests manage.py
      - run: cd backend && uvx ruff==0.15.21 check apps config tests manage.py

  backend-mypy:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DATABASE_URL: sqlite:////tmp/flathunter-mypy.sqlite3
      REDIS_URL: ""
      GEOCODING_PROVIDER: demo
      GEOCODING_EXTERNAL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: cd backend && uv venv
      - run: cd backend && uv pip install --python .venv/bin/python --requirement requirements-dev.lock
      - name: Capture mypy diagnostics
        run: cd backend && uv run --no-sync mypy apps config > ../stage7-mypy.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: stage7-mypy-diagnostics
          path: stage7-mypy.txt
          retention-days: 1
      - run: cd backend && uv run --no-sync mypy apps config

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: flathunter_test
          POSTGRES_USER: flathunter
          POSTGRES_PASSWORD: flathunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flathunter -d flathunter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgresql://flathunter:flathunter@127.0.0.1:5432/flathunter_test
      REDIS_URL: redis://127.0.0.1:6379/0
      TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
      GEOCODING_PROVIDER: demo
      GEOCODING_EXTERNAL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: cd backend && uv venv
      - run: cd backend && uv pip install --python .venv/bin/python --requirement requirements-dev.lock
      - name: Capture test diagnostics
        run: |
          cd backend
          uv run --no-sync python manage.py migrate --noinput > ../stage7-migrate.txt 2>&1 || true
          uv run --no-sync python manage.py makemigrations --check --dry-run > ../stage7-migration-drift.txt 2>&1 || true
          uv run --no-sync pytest --cov=apps --cov-report=term-missing > ../stage7-pytest.txt 2>&1 || true
          uvx pip-audit --strict -r requirements.lock > ../stage7-pip-audit.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: stage7-test-diagnostics
          path: |
            stage7-migrate.txt
            stage7-migration-drift.txt
            stage7-pytest.txt
            stage7-pip-audit.txt
          retention-days: 1
      - run: cd backend && uv run --no-sync python manage.py migrate --noinput
      - run: cd backend && uv run --no-sync python manage.py makemigrations --check --dry-run
      - run: cd backend && uv run --no-sync pytest --cov=apps --cov-report=term-missing
      - run: cd backend && uvx pip-audit --strict -r requirements.lock
