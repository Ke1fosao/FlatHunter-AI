name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format-stage8:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/stage-8-ai-hardening
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.21
      - name: Fix Stage 8 backend lint
        run: |
          python - <<'PY'
          from pathlib import Path

          rules = Path("backend/apps/ai_analysis/rules.py")
          text = rules.read_text()
          text = text.replace(
              '        "Точний час у дорозі потребує routing provider; без нього система не створює фальшиву точність.",',
              '        (\n            "Точний час у дорозі потребує routing provider; "\n            "без нього система не створює фальшиву точність."\n        ),',
          )
          text = text.replace(
              '        "Risk Score буде доданий окремим ринковим і ризиковим етапом; зараз він позначається як невідомий.",',
              '        (\n            "Risk Score буде доданий окремим ринковим і ризиковим етапом; "\n            "зараз він позначається як невідомий."\n        ),',
          )
          rules.write_text(text)

          schemas = Path("backend/apps/ai_analysis/schemas.py")
          text = schemas.read_text().replace(
              '        if self.price_min is not None and self.price_max is not None:\n            if self.price_min > self.price_max:\n                raise ValueError("price_min must not exceed price_max")',
              '        if (\n            self.price_min is not None\n            and self.price_max is not None\n            and self.price_min > self.price_max\n        ):\n            raise ValueError("price_min must not exceed price_max")',
          )
          schemas.write_text(text)
          PY
          ruff check --fix backend/apps/ai_analysis/services.py
          ruff format backend/apps/ai_analysis/rules.py backend/apps/ai_analysis/schemas.py backend/apps/ai_analysis/services.py
      - name: Commit lint fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/apps/ai_analysis/rules.py backend/apps/ai_analysis/schemas.py backend/apps/ai_analysis/services.py
          git commit -m "style: satisfy Stage 8 backend lint"
          git push

  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgresql://flathunter:flathunter@flathunter-postgres:5432/flathunter_test
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
      GEOCODING_PROVIDER: demo
      GEOCODING_EXTERNAL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag flathunter-backend:test ./backend
      - name: Start backend services
        run: |
          docker network create flathunter-ci
          docker run -d --network flathunter-ci --name flathunter-postgres -e POSTGRES_DB=flathunter_test -e POSTGRES_USER=flathunter -e POSTGRES_PASSWORD=flathunter postgis/postgis:17-3.5
          docker run -d --network flathunter-ci --name flathunter-redis redis:8-alpine
          for attempt in $(seq 1 30); do
            docker exec flathunter-postgres pg_isready -U flathunter -d flathunter_test && exit 0
            sleep 2
          done
          exit 1
      - name: Run backend quality gates
        id: backend_quality
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm --network flathunter-ci \
            --env DJANGO_SECRET_KEY --env DJANGO_DEBUG --env DATABASE_URL --env REDIS_URL \
            --env TELEGRAM_WEBHOOK_SECRET --env GEOCODING_PROVIDER --env GEOCODING_EXTERNAL_ENABLED \
            --entrypoint sh flathunter-backend:test -ec '
              uv pip install --system --requirement requirements-dev.lock
              ruff format --check apps config tests manage.py
              ruff check apps config tests manage.py
              mypy apps config
              python manage.py migrate --noinput
              python manage.py makemigrations --check --dry-run
              pytest --cov=apps --cov-report=term-missing
              uvx pip-audit --strict -r requirements.lock
            ' 2>&1 | tee backend-quality.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage8-backend-quality
          path: backend-quality.log
          if-no-files-found: error
      - if: steps.backend_quality.outcome == 'failure'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag flathunter-backend:ci ./backend
      - run: docker build --tag flathunter-miniapp:ci ./miniapp

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan current source tree with Gitleaks
        run: docker run --rm -v "$PWD:/repo:ro" zricethezav/gitleaks:v8.27.2 detect --source=/repo --no-git --redact --exit-code=1
