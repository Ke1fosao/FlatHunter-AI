name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-backend-stage2:
    if: github.head_ref == 'stage-2-search-profiles' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-2-search-profiles
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v6
      - working-directory: backend
        run: |
          uv venv
          uv pip install --python .venv/bin/python --requirement requirements-dev.lock
          uv run --no-sync ruff format apps config tests manage.py
      - run: |
          git config user.name 'FlatHunter CI'
          git config user.email 'actions@users.noreply.github.com'
          git add backend
          git diff --cached --quiet || git commit -m 'style: format typed Stage 2 backend'
          git push origin HEAD:stage-2-search-profiles

  backend:
    runs-on: ubuntu-latest
    steps:
      - run: echo 'formatter pass'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - run: echo 'formatter pass'

  containers:
    runs-on: ubuntu-latest
    steps:
      - run: echo 'formatter pass'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - run: echo 'formatter pass'
