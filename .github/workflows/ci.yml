name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-diagnostic:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: flathunter_test
          POSTGRES_USER: flathunter
          POSTGRES_PASSWORD: flathunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flathunter -d flathunter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgresql://flathunter:flathunter@127.0.0.1:5432/flathunter_test
      REDIS_URL: redis://127.0.0.1:6379/0
      TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
      GEOCODING_PROVIDER: demo
      GEOCODING_EXTERNAL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: cd backend && uv venv
      - run: cd backend && uv pip install --python .venv/bin/python --requirement requirements-dev.lock
      - name: Run and capture all backend gates
        run: |
          cd backend
          uv run --no-sync ruff format --check apps config tests manage.py > ../stage7-ruff-format.txt 2>&1; echo $? > ../stage7-ruff-format.code
          uv run --no-sync ruff check apps config tests manage.py > ../stage7-ruff-check.txt 2>&1; echo $? > ../stage7-ruff-check.code
          uv run --no-sync mypy apps config > ../stage7-mypy.txt 2>&1; echo $? > ../stage7-mypy.code
          uv run --no-sync python manage.py migrate --noinput > ../stage7-migrate.txt 2>&1; echo $? > ../stage7-migrate.code
          uv run --no-sync python manage.py makemigrations --check --dry-run > ../stage7-migration-drift.txt 2>&1; echo $? > ../stage7-migration-drift.code
          uv run --no-sync pytest --cov=apps --cov-report=term-missing > ../stage7-pytest.txt 2>&1; echo $? > ../stage7-pytest.code
          uvx pip-audit --strict -r requirements.lock > ../stage7-pip-audit.txt 2>&1; echo $? > ../stage7-pip-audit.code
      - uses: actions/upload-artifact@v4
        with:
          name: stage7-authoritative-backend-report
          path: |
            stage7-*.txt
            stage7-*.code
          retention-days: 1
      - name: End diagnostic run after artifact upload
        run: exit 1
