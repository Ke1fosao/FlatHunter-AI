name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-stage9-risk-metadata:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/stage-9-risk-market-analysis
      - name: Add trusted metadata risk signals
        run: |
          python - <<'PY'
          from pathlib import Path

          snapshots = Path("backend/apps/analysis/snapshots.py")
          content = snapshots.read_text()
          marker = '    "furniture",\n'
          addition = '    "hidden_commission",\n    "address_coordinate_mismatch",\n'
          if '    "hidden_commission",\n' not in content:
              content = content.replace(marker, marker + addition, 1)
          snapshots.write_text(content)

          risk = Path("backend/apps/analysis/risk.py")
          content = risk.read_text()
          function_marker = "\ndef _commission_signal(listing: Listing) -> RiskSignal | None:\n"
          metadata_function = '''\ndef _metadata_signals(listing: Listing) -> list[RiskSignal]:
    attributes = listing.attributes if isinstance(listing.attributes, dict) else {}
    signals: list[RiskSignal] = []
    relisted_count = attributes.get("relisted_count")
    if isinstance(relisted_count, int) and relisted_count >= 3:
        signals.append(
            _signal(
                "frequent_relisting",
                min(6 + relisted_count, 14),
                "medium" if relisted_count >= 5 else "low",
                "Оголошення неодноразово перевиставлялося",
                "Уточніть причину повторних публікацій і поточну актуальність квартири.",
                relisted_count=relisted_count,
            )
        )
    if attributes.get("address_coordinate_mismatch") is True:
        signals.append(
            _signal(
                "address_coordinate_mismatch",
                16,
                "medium",
                "Перевірена адресна ознака не узгоджується з координатами",
                "Звірте адресу на перегляді та не покладайтеся лише на точку на карті.",
                location_accuracy=listing.location_accuracy,
                trusted_mismatch=True,
            )
        )
    return signals
'''
          if "def _metadata_signals" not in content:
              if function_marker not in content:
                  raise SystemExit("commission marker not found")
              content = content.replace(function_marker, metadata_function + function_marker, 1)
          extend_marker = "    signals.extend(_price_history_signals(listing))\n    signals.extend(_content_signals(listing))\n"
          extend_replacement = (
              "    signals.extend(_price_history_signals(listing))\n"
              "    signals.extend(_content_signals(listing))\n"
              "    signals.extend(_metadata_signals(listing))\n"
          )
          if "signals.extend(_metadata_signals(listing))" not in content:
              if extend_marker not in content:
                  raise SystemExit("risk aggregation marker not found")
              content = content.replace(extend_marker, extend_replacement, 1)
          risk.write_text(content)

          tests = Path("backend/tests/test_stage9_risk.py")
          content = tests.read_text()
          test_block = '''\n\ndef test_trusted_metadata_signals_are_scored_and_explained(risk_source):
    listing = make_risk_listing(
        risk_source,
        "risk-metadata",
        description=(
            "Синтетичне оголошення з достатнім описом умов, площі, поверху, договору "
            "та порядку перевірки документів під час особистого перегляду квартири."
        ),
    )
    listing.attributes = {
        "demo": True,
        "relisted_count": 5,
        "address_coordinate_mismatch": True,
    }
    listing.save(update_fields=("attributes",))

    result = calculate_risk_assessment(listing, make_market(listing, "-4.00"))
    signals = {signal.code: signal for signal in result.signals}

    assert "frequent_relisting" in signals
    assert signals["frequent_relisting"].evidence["relisted_count"] == 5
    assert "address_coordinate_mismatch" in signals
    assert signals["address_coordinate_mismatch"].evidence["trusted_mismatch"] is True
'''
          if "test_trusted_metadata_signals_are_scored_and_explained" not in content:
              content += test_block
          tests.write_text(content)
          PY
          python -m pip install --disable-pip-version-check ruff==0.15.21
          cd backend
          ruff format apps/analysis/snapshots.py apps/analysis/risk.py tests/test_stage9_risk.py
          ruff check apps/analysis/snapshots.py apps/analysis/risk.py tests/test_stage9_risk.py --fix
      - name: Commit risk metadata signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/apps/analysis/snapshots.py backend/apps/analysis/risk.py backend/tests/test_stage9_risk.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat: complete trusted metadata risk signals"
          git push

  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgresql://flathunter:flathunter@flathunter-postgres:5432/flathunter_test
      REDIS_URL: redis://flathunter-redis:6379/0
      TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
      GEOCODING_PROVIDER: demo
      GEOCODING_EXTERNAL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag flathunter-backend:test ./backend
      - name: Start backend services
        run: |
          docker network create flathunter-ci
          docker run -d --network flathunter-ci --name flathunter-postgres -e POSTGRES_DB=flathunter_test -e POSTGRES_USER=flathunter -e POSTGRES_PASSWORD=flathunter postgis/postgis:17-3.5
          docker run -d --network flathunter-ci --name flathunter-redis redis:8-alpine
          for attempt in $(seq 1 30); do
            docker exec flathunter-postgres pg_isready -U flathunter -d flathunter_test && exit 0
            sleep 2
          done
          exit 1
      - name: Run backend quality gates
        id: backend_quality
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm --network flathunter-ci \
            --env DJANGO_SECRET_KEY --env DJANGO_DEBUG --env DATABASE_URL --env REDIS_URL \
            --env TELEGRAM_WEBHOOK_SECRET --env GEOCODING_PROVIDER --env GEOCODING_EXTERNAL_ENABLED \
            --entrypoint sh flathunter-backend:test -ec '
              uv pip install --system --requirement requirements-dev.lock
              ruff format --check apps config tests manage.py
              ruff check apps config tests manage.py
              mypy apps config
              python manage.py migrate --noinput
              python manage.py makemigrations --check --dry-run
              pytest --cov=apps --cov-report=term-missing
              uvx pip-audit --strict -r requirements.lock
            ' 2>&1 | tee backend-quality.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage9-backend-diagnostic
          path: backend-quality.log
          if-no-files-found: error
      - if: steps.backend_quality.outcome == 'failure'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag flathunter-backend:ci ./backend
      - run: docker build --tag flathunter-miniapp:ci ./miniapp

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan current source tree with Gitleaks
        run: docker run --rm -v "$PWD:/repo:ro" zricethezav/gitleaks:v8.27.2 detect --source=/repo --no-git --redact --exit-code=1
