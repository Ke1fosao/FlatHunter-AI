name: Stage 6 Prepare

on:
  push:
    branches: [stage-6-map-geodata]

permissions:
  contents: write

concurrency:
  group: stage6-prepare
  cancel-in-progress: true

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage-6-map-geodata
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - name: Format backend
        run: |
          cd backend
          uv venv
          uv pip install --python .venv/bin/python --requirement requirements-dev.lock
          uv run --no-sync ruff format apps config tests manage.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - name: Update frontend lockfile and format
        run: |
          cd miniapp
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund
          npx eslint . --fix || true
      - name: Commit prepared source
        run: |
          if git diff --quiet; then
            echo "No preparation changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend miniapp
          git commit -m "style: prepare Stage 6 source and lockfile"
          git push origin HEAD:stage-6-map-geodata
