services:
  backend:
    environment:
      DJANGO_DEBUG: "false"
      SECURE_HSTS_SECONDS: "31536000"
      SECURE_SSL_REDIRECT: "true"
      TELEGRAM_MODE: webhook
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--timeout", "60", "--access-logfile", "-"]

  telegram-bot:
    profiles: ["disabled"]

  gateway:
    ports:
      - "80:80"
