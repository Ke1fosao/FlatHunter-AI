upstream flathunter_backend {
    server backend:8000;
    keepalive 32;
}

upstream flathunter_miniapp {
    server miniapp:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org; base-uri 'self'; form-action 'self'" always;

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
    }

    location ~ ^/(api|admin|health)/ {
        proxy_pass http://flathunter_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location = /health {
        proxy_pass http://flathunter_miniapp/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://flathunter_miniapp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
